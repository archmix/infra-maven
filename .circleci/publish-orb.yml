version: 2.1

orbs:
  orb-tools: circleci/orb-tools@12.3.1
  shellcheck: circleci/shellcheck@3.2

branch-filter: &branch-filter
  branches:
    ignore: dev

workflows:
  publish:
    jobs:
      - orb-tools/lint:
          name: lint
      - orb-tools/pack:
          name: pack
          requires: 
            - lint
      - shellcheck/check:
          name: check
          filters: *branch-filter
          requires: 
            - pack
      
      - orb-tools/publish:
          name: publish-dev
          context: Archmix
          orb_name: archmix/maven
          vcs_type: <<pipeline.project.type>>
          pub_type: dev
          circleci_token: CIRCLECI_API_TOKEN
          enable_pr_comment: false
          requires:
            - pack
          filters:
            branches:
              only: master
      
      - orb-tools/publish:
          name: publish
          context: Archmix
          orb_name: archmix/maven
          vcs_type: <<pipeline.project.type>>
          pub_type: production
          circleci_token: CIRCLECI_API_TOKEN
          enable_pr_comment: false
          requires:
            - pack
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
